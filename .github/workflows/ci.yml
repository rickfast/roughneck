name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test workspace
        run: cargo test --workspace --exclude roughneck-py --exclude roughneck-node

      - name: Check Python bindings crate
        run: cargo check -p roughneck-py

      - name: Check Node bindings crate
        run: cargo check -p roughneck-node

      - name: Check Rust example crate
        run: cargo check --manifest-path examples/basic_agent/Cargo.toml

  python-binding:
    name: Python Binding
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build tooling
        run: python -m pip install --upgrade pip maturin mypy

      - name: Build and install Python package
        run: python -m pip install ./crates/roughneck-py

      - name: Run Python runtime smoke test
        run: python crates/roughneck-py/tests/runtime_smoke.py

      - name: Run Python typing smoke test
        run: python -m mypy crates/roughneck-py/tests/typecheck_smoke.py

  node-binding:
    name: Node Binding
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crates/roughneck-node/package-lock.json

      - name: Install Node dependencies
        working-directory: crates/roughneck-node
        run: npm ci

      - name: Build Node addon
        working-directory: crates/roughneck-node
        run: npm run build

      - name: Run Node runtime smoke test
        working-directory: crates/roughneck-node
        run: npm run smoke:runtime

      - name: Run Node typing smoke test
        working-directory: crates/roughneck-node
        run: npm run smoke:types
